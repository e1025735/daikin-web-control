<!DOCTYPE html>
<html lang="en">
<head>
	<script src="./config.js"></script>
	<title>AC Control</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="apple-touch-icon" href="media/apple-touch-icon.png">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="icon" type="image/x-icon" href="./media/favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<script>
		(function () {
			try {
				var stored = localStorage.getItem("theme") || "auto";
				var resolved = stored;
				if (stored === "auto") {
					resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
				}
				document.documentElement.setAttribute("data-theme", resolved);
			} catch (e) {
				document.documentElement.setAttribute("data-theme", "light");
			}
		})();
	</script>


	<link href="./font-awesome/css/all.min.css" rel="stylesheet">
	<link href="./bootstrap/css/bootstrap.css" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="./AC_Control.css" media="screen"/>
</head>
<body>
<div class='main-container' >
	 <a class="logo"><img src="./media/Daikin-Logo-long.png" width="340px" style="margin:auto"/> </a>

		<nav class="navbar navbar-expand navbar-light fixed-top" role="navigation">
		  <div class="container-fluid">
			<div class="navbar-brand" id="navbar-brand">
				<p> AC Control  <var id="activeUnitName"></var> </p>
			</div>
			<p class="navbar-text ml-auto sr-only" id="spinner" ><i class="fa-solid fa-arrows-rotate fa-spin fa-3x fa-fw"></i></p>
		  </div>
		</nav>

		<div  class="alert alert-danger sr-only" id="alert">
			<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			<p></p>
		</div>

		<div class="container">
			<!-- Theme switcher -->
			<div class="row theme-switcher-row">
				<div class="theme-switcher">
					<div class="btn-group" role="group" aria-label="Theme">
						<a class="btn btn-light theme-btn" id="themeAuto" onclick='set_theme("auto");' title="Auto (follow system)" aria-label="Auto theme"><i class="fa-solid fa-circle-half-stroke"></i></a>
						<a class="btn btn-light theme-btn" id="themeLight" onclick='set_theme("light");' title="Light theme" aria-label="Light theme"><i class="fa-solid fa-sun"></i></a>
						<a class="btn btn-light theme-btn" id="themeDark" onclick='set_theme("dark");' title="Dark theme" aria-label="Dark theme"><i class="fa-solid fa-moon"></i></a>
					</div>
				</div>
			</div>
			<div class="row" id="unit-row">
	   		<div class="col-md-4 col-sm-6">
	   			<!--Unit Selection -->
					<h4>Unit Selection</h4>
					<div class="btn-group">
						<a class="btn btn-light unit-btn" id="1" onclick='unit_onclick("1");'><i id="1Icon" class="fa-solid fa-2x "></i></a>
						<a class="btn btn-light unit-btn" id="2" 	onclick='unit_onclick("2");'><i id="2Icon" class="fa-solid fa-2x "></i></a>
						<a class="btn btn-light unit-btn" id="3" onclick='unit_onclick("3");'><i id="3Icon" class="fa-solid fa-2x "></i></a>
					</div>
		  	</div>
			</div>
			<div class="row" >
				<!-- ON/OFF -->
		  		<div class="power-container">
		  		<h4>Power</h4>
		  			<a class="btn btn-light" id="powerBtn" onclick='power_onclick();'>
		  				<i class="fa-solid fa-power-off" id="powerIcn" style="font-size:1.6em;color:red;"></i><b style="font-size:1.5em;" id="power"> OFF</b>
		  			</a>
		  		</div>
		  		<!-- TIMER -->
		  		<div class="timer-container">
		  		<h4>Timer</h4>
		  			<a class="btn btn-light" id="timerBtn" onclick='timer_open_dialog();' title="Set ON/OFF timer">
		  				<i class="fa-regular fa-clock" id="timerIcn" style="font-size:1.6em;"></i>
		  				<span class="timer-summary" id="timerSummary">
		  					<b id="timerOnLabel" class="timer-slot-label sr-only"><i class="fa fa-power-off" style="color:green;"></i> <span id="timerOnCountdown"></span></b>
		  					<b id="timerOffLabel" class="timer-slot-label sr-only"><i class="fa fa-power-off" style="color:red;"></i> <span id="timerOffCountdown"></span></b>
		  					<b id="timerNoneLabel" style="font-size:1.5em;"> --</b>
		  				</span>
		  			</a>
		  		</div>
		  		<div class="temp-container" onclick='resetTemp_onclick();'>
		  			<!-- TEMPERATURES -->
					<h4>Measured temperatures</h4>
					<div class="btn-group" id="tempBtn">
						<a class="btn btn-light" style="font-size: 1.5em;">
							<i class="fa-solid fa-house" title="Inside temperatures"></i><b id="home_temp"> - C</b>
						</a>
					</div>
					<div class="btn-group" >
						<a class="btn btn-light" style="font-size:1.5em">
							<i class="fa-solid fa-globe" title="Outside temperatures"></i><b id="outside_temp"> - C</b>
						</a>
					</div>
		  	</div>

	  		</div>
			<br>
			<div class="row">
	   			<div class="container">
	   			<!-- Mode -->
					<h4>Operation Mode</h4>
					<div class="btn-group">
						<a class="btn btn-light mode-btn" id="mode_cooling" onclick='mode_onclick("3");'><i class="fa-solid fa-snowflake fa-2x"></i></a>
						<a class="btn btn-light mode-btn" id="mode_dehum"  onclick='mode_onclick("2");'><i class="fa-solid fa-droplet fa-2x"></i></a>
						<a class="btn btn-light mode-btn" id="mode_heating" onclick='mode_onclick("4");'><i class="fa-solid fa-sun fa-2x"></i></a>
						<a class="btn btn-light mode-btn" id="mode_fan" 		 onclick='mode_onclick("6");'><i class="fa-solid fa-fan fa-2x"></i></a>
						<a class="btn btn-light mode-btn" id="mode_auto" 	 onclick='mode_onclick("1");'><i class="fa-solid fa-font fa-2x"></i></a>
					</div>
		  		</div>
		  		<div class="container">
		  			<!-- Fan -->
					<h4>Fan Mode</h4>
					<div class="btn-group">
						<a class="btn btn-light fan-btn" id="fan_auto" onclick='fan_onclick("A");'><i class="fa-solid fa-font fa-2x"></i></a>
						<a class="btn btn-light fan-btn" id="fan_eco" 	onclick='fan_onclick("B");'><i class="fa-solid fa-leaf fa-2x"></i></a>
						<a class="btn btn-light" onclick='fan_onclick("3");'><img src="./media/level_1_off.svg" height="29px" id="fan_lvl_1"></a>
						<a class="btn btn-light" onclick='fan_onclick("4");'><img src="./media/level_2_off.svg" height="29px" id="fan_lvl_2"></a>
						<a class="btn btn-light" onclick='fan_onclick("5");'><img src="./media/level_3_off.svg" height="29px" id="fan_lvl_3"></a>
						<a class="btn btn-light" onclick='fan_onclick("6");'><img src="./media/level_4_off.svg" height="29px" id="fan_lvl_4"></a>
						<a class="btn btn-light" onclick='fan_onclick("7");'><img src="./media/level_5_off.svg" height="29px" id="fan_lvl_5"></a>
					</div>
		  		</div>
		  		<div class="container">
		  			<!-- Wings Direction -->
					<h4>Wings Direction</h4>
					<div class="btn-group" >
						<a class="btn btn-light wing-btn" id="wing_v" onclick='wing_onclick("1");'><i class="fa-solid fa-arrows-up-down fa-2x"></i></a>
						<a class="btn btn-light wing-btn" id="wing_h" onclick='wing_onclick("2");'><i class="fa-solid fa-arrows-left-right fa-2x"></i></a>
						<a class="btn btn-light wing-btn"	id="wing_b" onclick='wing_onclick("3");'><i class="fa-solid fa-up-down-left-right fa-2x"></i></a>
						<a class="btn btn-light wing-btn"	id="wing_s" onclick='wing_onclick("0");'><i class="fa-solid fa-stop fa-2x"></i></a>
					</div>
				</div>
		  	</div>
		  	<div class="row">
		  		<div class="container" id="target_temp_col">

		  			<!--Target temperature-->
					<h4><i class="fa-solid fa-temperature-high"></i> Target temperature</h4>
					<div class="btn-group" >
						<a class="btn btn-light target-temp-pill" id="target_temp_btn"><b id="target_temp"> ~ C</b></a>
					</div>

					<div class="btn-group-vertical">
						<a class="btn btn-light wing-btn" id="target_temp_up" onclick='temp_onclick(0.5);' style="font-size:1.7em;padding-top:0px;padding-bottom:0px;"><i class="fa-solid fa-chevron-up"></i></a>
						<a class="btn btn-light wing-btn"	id="target_temp_down" onclick='temp_onclick(-0.5);' style="font-size:1.7em;padding-top:0px;padding-bottom:0px;"><i class="fa-solid fa-chevron-down"></i></a>
					</div>
						<br>
						<br>
						<br>
		  		</div>
	  		</div>
		</div>
	</div>

	<!-- Timer dialog -->
	<div class="timer-modal-backdrop sr-only" id="timerModalBackdrop" onclick='timer_close_dialog();'></div>
	<div class="timer-modal sr-only" id="timerModal" role="dialog" aria-modal="true" aria-labelledby="timerModalTitle">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<h4 class="modal-title" id="timerModalTitle"><i class="fa-regular fa-clock"></i> Timer — <span id="timerModalUnit"></span></h4>
					<button type="button" class="close" onclick='timer_close_dialog();' aria-label="Close"><span aria-hidden="true">&times;</span></button>
				</div>
				<div class="modal-body">
					<p class="text-muted" style="font-size:0.9em;">Each timer can be set up to 24 hours ahead.</p>

					<!-- ON timer slot -->
					<div class="timer-slot" data-slot="on">
						<h4><i class="fa fa-power-off" style="color:green;"></i> Turn ON</h4>
						<div class="btn-group" role="group" aria-label="ON timer entry mode">
							<a class="btn btn-light timer-mode-btn active" data-slot="on" data-mode="relative" onclick='timer_set_mode("on","relative");'><i class="fa fa-hourglass-half"></i> In</a>
							<a class="btn btn-light timer-mode-btn" data-slot="on" data-mode="absolute" onclick='timer_set_mode("on","absolute");'><i class="fa fa-calendar-day"></i> At</a>
						</div>
						<div class="timer-entry timer-entry-relative" data-slot="on">
							<label><input type="number" min="0" max="23" value="0" id="timerOnRelHours" class="form-control timer-num"> h</label>
							<label><input type="number" min="0" max="59" value="30" id="timerOnRelMinutes" class="form-control timer-num"> m</label>
						</div>
						<div class="timer-entry timer-entry-absolute sr-only" data-slot="on">
							<input type="time" id="timerOnAbs" class="form-control timer-time">
						</div>
						<div class="timer-actions">
							<a class="btn btn-info" onclick='timer_save("on");'><i class="fa fa-check"></i> Save</a>
							<a class="btn btn-light" onclick='timer_clear("on");' id="timerOnClearBtn"><i class="fa fa-trash"></i> Clear</a>
							<span class="timer-current sr-only" id="timerOnCurrent"></span>
						</div>
					</div>

					<hr>

					<!-- OFF timer slot -->
					<div class="timer-slot" data-slot="off">
						<h4><i class="fa fa-power-off" style="color:red;"></i> Turn OFF</h4>
						<div class="btn-group" role="group" aria-label="OFF timer entry mode">
							<a class="btn btn-light timer-mode-btn active" data-slot="off" data-mode="relative" onclick='timer_set_mode("off","relative");'><i class="fa fa-hourglass-half"></i> In</a>
							<a class="btn btn-light timer-mode-btn" data-slot="off" data-mode="absolute" onclick='timer_set_mode("off","absolute");'><i class="fa fa-calendar-day"></i> At</a>
						</div>
						<div class="timer-entry timer-entry-relative" data-slot="off">
							<label><input type="number" min="0" max="23" value="1" id="timerOffRelHours" class="form-control timer-num"> h</label>
							<label><input type="number" min="0" max="59" value="0" id="timerOffRelMinutes" class="form-control timer-num"> m</label>
						</div>
						<div class="timer-entry timer-entry-absolute sr-only" data-slot="off">
							<input type="time" id="timerOffAbs" class="form-control timer-time">
						</div>
						<div class="timer-actions">
							<a class="btn btn-info" onclick='timer_save("off");'><i class="fa fa-check"></i> Save</a>
							<a class="btn btn-light" onclick='timer_clear("off");' id="timerOffClearBtn"><i class="fa fa-trash"></i> Clear</a>
							<span class="timer-current sr-only" id="timerOffCurrent"></span>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<a class="btn btn-light" onclick='timer_close_dialog();'><i class="fa fa-xmark"></i> Close</a>
				</div>
			</div>
		</div>
	</div>

<script type="text/javascript" src="./daikin_ui.js"></script>
</body>
</html>
