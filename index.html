<!DOCTYPE html>
<html lang="en">
<head>
	<title>AC Control</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="apple-touch-icon" href="media/apple-touch-icon.png">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="icon" type="image/x-icon" href="./media/favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<script>
		(function () {
			try {
				var stored = localStorage.getItem("theme") || "auto";
				var resolved = stored;
				if (stored === "auto") {
					resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
				}
				document.documentElement.setAttribute("data-theme", resolved);
			} catch (e) {
				document.documentElement.setAttribute("data-theme", "light");
			}
		})();
	</script>


	<link href="./font-awesome/css/all.min.css" rel="stylesheet">
	<link href="./bootstrap/css/bootstrap.css" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="./AC_Control.css" media="screen"/>
</head>
<body>
<div class='main-container'>
	<a class="logo"><img src="./media/Daikin-Logo-long.png" width="340px" style="margin:auto"/></a>

	<nav class="navbar navbar-expand navbar-light fixed-top" role="navigation">
		<div class="container-fluid">
			<div class="navbar-brand" id="navbar-brand">
				<p> AC Control <var id="activeUnitName"></var></p>
			</div>
			<p class="navbar-text ms-auto visually-hidden" id="spinner"><i class="fa-solid fa-arrows-rotate fa-spin fa-fw"></i></p>
		</div>
	</nav>

	<div class="alert alert-danger alert-dismissible visually-hidden" id="alert">
		<button type="button" class="btn-close" id="alertClose" aria-label="Close"></button>
		<p></p>
	</div>

	<div class="container">
		<!-- Theme switcher -->
		<div class="row theme-switcher-row">
			<div class="theme-switcher">
				<div class="btn-group" role="group" aria-label="Theme">
					<button type="button" class="btn btn-light theme-btn" id="themeAuto"  title="Auto (follow system)" aria-label="Auto theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
					<button type="button" class="btn btn-light theme-btn" id="themeLight" title="Light theme"           aria-label="Light theme"><i class="fa-solid fa-sun"></i></button>
					<button type="button" class="btn btn-light theme-btn" id="themeDark"  title="Dark theme"            aria-label="Dark theme"><i class="fa-solid fa-moon"></i></button>
				</div>
			</div>
		</div>

		<!-- Unit selection (rendered from config.units by js/units.js) -->
		<div class="row" id="unit-row">
			<div class="col-md-4 col-sm-6">
				<h4>Unit Selection</h4>
				<div class="btn-group" id="unit-buttons" role="group" aria-label="Unit selection"></div>
			</div>
		</div>

		<div class="row">
			<!-- ON/OFF -->
			<div class="power-container">
				<h4>Power</h4>
				<button type="button" class="btn btn-light" id="powerBtn">
					<i class="fa-solid fa-power-off" id="powerIcn" style="font-size:1.6em;color:red;"></i><b style="font-size:1.5em;" id="power"> OFF</b>
				</button>
			</div>

			<!-- TIMER -->
			<div class="timer-container">
				<h4>Timer</h4>
				<button type="button" class="btn btn-light" id="timerBtn" title="Set ON/OFF timer">
					<i class="fa-regular fa-clock" id="timerIcn" style="font-size:1.6em;"></i>
					<span class="timer-summary" id="timerSummary">
						<b id="timerOnLabel"  class="timer-slot-label visually-hidden"><i class="fa fa-power-off" style="color:green;"></i> <span id="timerOnCountdown"></span></b>
						<b id="timerOffLabel" class="timer-slot-label visually-hidden"><i class="fa fa-power-off" style="color:red;"></i> <span id="timerOffCountdown"></span></b>
						<b id="timerNoneLabel" style="font-size:1.5em;"> --</b>
					</span>
				</button>
			</div>

			<!-- TEMPERATURES -->
			<div class="temp-container">
				<h4>Measured temperatures</h4>
				<div class="btn-group" id="tempBtn">
					<button type="button" class="btn btn-light" style="font-size: 1.5em;">
						<i class="fa-solid fa-house" title="Inside temperatures"></i><b id="home_temp"> - C</b>
					</button>
				</div>
				<div class="btn-group">
					<button type="button" class="btn btn-light" style="font-size:1.5em">
						<i class="fa-solid fa-globe" title="Outside temperatures"></i><b id="outside_temp"> - C</b>
					</button>
				</div>
			</div>
		</div>

		<br>

		<div class="row">
			<!-- Mode -->
			<div class="container">
				<h4>Operation Mode</h4>
				<div class="btn-group" id="mode-group" role="group" aria-label="Operation mode">
					<button type="button" class="btn btn-light mode-btn" id="mode_cooling" data-mode="3"><i class="fa-solid fa-snowflake fa-2x"></i></button>
					<button type="button" class="btn btn-light mode-btn" id="mode_dehum"   data-mode="2"><i class="fa-solid fa-droplet fa-2x"></i></button>
					<button type="button" class="btn btn-light mode-btn" id="mode_heating" data-mode="4"><i class="fa-solid fa-sun fa-2x"></i></button>
					<button type="button" class="btn btn-light mode-btn" id="mode_fan"     data-mode="6"><i class="fa-solid fa-fan fa-2x"></i></button>
					<button type="button" class="btn btn-light mode-btn" id="mode_auto"    data-mode="1"><i class="fa-solid fa-font fa-2x"></i></button>
				</div>
			</div>

			<!-- Fan -->
			<div class="container">
				<h4>Fan Mode</h4>
				<div class="btn-group" id="fan-group" role="group" aria-label="Fan mode">
					<button type="button" class="btn btn-light fan-btn" id="fan_auto" data-fan-rate="A"><i class="fa-solid fa-font fa-2x"></i></button>
					<button type="button" class="btn btn-light fan-btn" id="fan_eco"  data-fan-rate="B"><i class="fa-solid fa-leaf fa-2x"></i></button>
					<button type="button" class="btn btn-light"         data-fan-rate="3"><img src="./media/level_1_off.svg" height="29px" id="fan_lvl_1"></button>
					<button type="button" class="btn btn-light"         data-fan-rate="4"><img src="./media/level_2_off.svg" height="29px" id="fan_lvl_2"></button>
					<button type="button" class="btn btn-light"         data-fan-rate="5"><img src="./media/level_3_off.svg" height="29px" id="fan_lvl_3"></button>
					<button type="button" class="btn btn-light"         data-fan-rate="6"><img src="./media/level_4_off.svg" height="29px" id="fan_lvl_4"></button>
					<button type="button" class="btn btn-light"         data-fan-rate="7"><img src="./media/level_5_off.svg" height="29px" id="fan_lvl_5"></button>
				</div>
			</div>

			<!-- Wings Direction -->
			<div class="container">
				<h4>Wings Direction</h4>
				<div class="btn-group" id="wing-group" role="group" aria-label="Wing direction">
					<button type="button" class="btn btn-light wing-btn" id="wing_v" data-wing-dir="1"><i class="fa-solid fa-arrows-up-down fa-2x"></i></button>
					<button type="button" class="btn btn-light wing-btn" id="wing_h" data-wing-dir="2"><i class="fa-solid fa-arrows-left-right fa-2x"></i></button>
					<button type="button" class="btn btn-light wing-btn" id="wing_b" data-wing-dir="3"><i class="fa-solid fa-up-down-left-right fa-2x"></i></button>
					<button type="button" class="btn btn-light wing-btn" id="wing_s" data-wing-dir="0"><i class="fa-solid fa-stop fa-2x"></i></button>
				</div>
			</div>
		</div>

		<div class="row">
			<div class="container" id="target_temp_col">
				<h4><i class="fa-solid fa-temperature-high"></i> Target temperature</h4>
				<div class="btn-group">
					<button type="button" class="btn btn-light target-temp-pill" id="target_temp_btn"><b id="target_temp"> ~ C</b></button>
				</div>

				<div class="btn-group-vertical" id="target-temp-group">
					<button type="button" class="btn btn-light wing-btn" id="target_temp_up"   data-temp-delta="0.5"  style="font-size:1.7em;padding-top:0px;padding-bottom:0px;"><i class="fa-solid fa-chevron-up"></i></button>
					<button type="button" class="btn btn-light wing-btn" id="target_temp_down" data-temp-delta="-0.5" style="font-size:1.7em;padding-top:0px;padding-bottom:0px;"><i class="fa-solid fa-chevron-down"></i></button>
				</div>
				<br><br><br>
			</div>
		</div>
	</div>
</div>

<!-- Timer dialog -->
<div class="timer-modal-backdrop visually-hidden" id="timerModalBackdrop" data-timer-close></div>
<div class="timer-modal visually-hidden" id="timerModal" role="dialog" aria-modal="true" aria-labelledby="timerModalTitle">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<h4 class="modal-title" id="timerModalTitle"><i class="fa-regular fa-clock"></i> Timer — <span id="timerModalUnit"></span></h4>
				<button type="button" class="close" data-timer-close aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<p class="text-muted" style="font-size:0.9em;">Each timer can be set up to 24 hours ahead.</p>

				<!-- ON timer slot -->
				<div class="timer-slot" data-slot="on">
					<h4><i class="fa fa-power-off" style="color:green;"></i> Turn ON</h4>
					<div class="btn-group" role="group" aria-label="ON timer entry mode">
						<button type="button" class="btn btn-light timer-mode-btn active" data-slot="on" data-mode="relative"><i class="fa fa-hourglass-half"></i> In</button>
						<button type="button" class="btn btn-light timer-mode-btn"        data-slot="on" data-mode="absolute"><i class="fa fa-calendar-day"></i> At</button>
					</div>
					<div class="timer-entry timer-entry-relative" data-slot="on">
						<label><input type="number" min="0" max="23" value="0"  id="timerOnRelHours"   class="form-control timer-num"> h</label>
						<label><input type="number" min="0" max="59" value="30" id="timerOnRelMinutes" class="form-control timer-num"> m</label>
					</div>
					<div class="timer-entry timer-entry-absolute visually-hidden" data-slot="on">
						<input type="time" id="timerOnAbs" class="form-control timer-time">
					</div>
					<div class="timer-actions">
						<button type="button" class="btn btn-info"  data-timer-save="on"><i class="fa fa-check"></i> Save</button>
						<button type="button" class="btn btn-light" data-timer-clear="on" id="timerOnClearBtn"><i class="fa fa-trash"></i> Clear</button>
						<span class="timer-current visually-hidden" id="timerOnCurrent"></span>
					</div>
				</div>

				<hr>

				<!-- OFF timer slot -->
				<div class="timer-slot" data-slot="off">
					<h4><i class="fa fa-power-off" style="color:red;"></i> Turn OFF</h4>
					<div class="btn-group" role="group" aria-label="OFF timer entry mode">
						<button type="button" class="btn btn-light timer-mode-btn active" data-slot="off" data-mode="relative"><i class="fa fa-hourglass-half"></i> In</button>
						<button type="button" class="btn btn-light timer-mode-btn"        data-slot="off" data-mode="absolute"><i class="fa fa-calendar-day"></i> At</button>
					</div>
					<div class="timer-entry timer-entry-relative" data-slot="off">
						<label><input type="number" min="0" max="23" value="1" id="timerOffRelHours"   class="form-control timer-num"> h</label>
						<label><input type="number" min="0" max="59" value="0" id="timerOffRelMinutes" class="form-control timer-num"> m</label>
					</div>
					<div class="timer-entry timer-entry-absolute visually-hidden" data-slot="off">
						<input type="time" id="timerOffAbs" class="form-control timer-time">
					</div>
					<div class="timer-actions">
						<button type="button" class="btn btn-info"  data-timer-save="off"><i class="fa fa-check"></i> Save</button>
						<button type="button" class="btn btn-light" data-timer-clear="off" id="timerOffClearBtn"><i class="fa fa-trash"></i> Clear</button>
						<span class="timer-current visually-hidden" id="timerOffCurrent"></span>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-light" data-timer-close><i class="fa fa-xmark"></i> Close</button>
			</div>
		</div>
	</div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
